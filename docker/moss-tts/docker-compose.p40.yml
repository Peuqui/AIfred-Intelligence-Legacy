services:
  moss-tts:
    image: moss-tts-1.7b-p40
    build:
      context: .
      dockerfile: Dockerfile.p40
    container_name: moss-tts-p40
    restart: "no"  # AIfred controls container lifecycle
    ports:
      - "5055:5055"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      # ============================================================
      # Model Selection
      # ============================================================
      - MOSS_MODEL=OpenMOSS-Team/MOSS-TTS-Local-Transformer
      # ============================================================
      # Smart Device Selection
      # ============================================================
      # P40 has 24GB VRAM - lower threshold is fine
      - MOSS_VRAM_THRESHOLD=4.0
      - MOSS_FORCE_CPU=${MOSS_FORCE_CPU:-0}
      - MOSS_EAGER_LOAD=${MOSS_EAGER_LOAD:-1}
      # ============================================================
      # Inference Parameters
      # ============================================================
      - MOSS_TEMPERATURE=1.5
      - MOSS_TOP_P=0.95
      - MOSS_TOP_K=50
      - MOSS_REPETITION_PENALTY=1.1
      # ============================================================
      # torch.compile optimization (GPU only)
      # ============================================================
      - MOSS_TORCH_COMPILE=1
      # ============================================================
      # Auto-Shutdown
      # ============================================================
      - MOSS_KEEP_ALIVE=15
    volumes:
      # Cache HuggingFace models persistently
      - moss_models_p40:/root/.cache/huggingface
      # Reference audio files for voice cloning
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

volumes:
  moss_models_p40:
    name: moss_models_p40
