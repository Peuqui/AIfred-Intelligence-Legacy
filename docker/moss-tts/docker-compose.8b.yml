services:
  moss-tts:
    image: moss-tts-8b
    build:
      context: .
      dockerfile: Dockerfile.8b
    container_name: moss-tts-8b
    restart: "no"  # AIfred controls container lifecycle
    ports:
      - "5055:5055"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['1']
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=1
      - CUDA_VISIBLE_DEVICES=0
      # ============================================================
      # Model Selection — 8B Flagship (MossTTSDelay)
      # ============================================================
      - MOSS_MODEL=OpenMOSS-Team/MOSS-TTS
      # ============================================================
      # Smart Device Selection
      # ============================================================
      # 8B model needs ~34GB VRAM at float32 (float16 causes NaN on Turing GPUs)
      - MOSS_VRAM_THRESHOLD=30.0
      - MOSS_FORCE_CPU=${MOSS_FORCE_CPU:-0}
      - MOSS_EAGER_LOAD=${MOSS_EAGER_LOAD:-1}
      # ============================================================
      # Inference Parameters (8B recommended defaults)
      # ============================================================
      - MOSS_TEMPERATURE=1.7
      - MOSS_TOP_P=0.8
      - MOSS_TOP_K=25
      - MOSS_REPETITION_PENALTY=1.0
      # ============================================================
      # torch.compile (disabled by default for 8B — large model)
      # ============================================================
      - MOSS_TORCH_COMPILE=0
      # ============================================================
      # Auto-Shutdown
      # ============================================================
      - MOSS_KEEP_ALIVE=15
    volumes:
      # Separate cache for 8B model (~17GB download)
      - moss_models_8b:/root/.cache/huggingface
      # Reference audio files for voice cloning
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s  # 8B model needs more time to download (~17GB)

volumes:
  moss_models_8b:
    name: moss_models_8b
