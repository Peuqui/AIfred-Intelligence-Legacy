services:
  moss-tts:
    image: moss-tts-1.7b
    build: .
    container_name: moss-tts
    restart: "no"  # AIfred controls container lifecycle
    ports:
      - "5055:5055"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['${FASTEST_GPU_ID:-1}']
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=${FASTEST_GPU_ID:-1}
      - CUDA_VISIBLE_DEVICES=0
      # ============================================================
      # Model Selection
      # ============================================================
      # HuggingFace model ID (1.7B Local or 8B Flagship)
      - MOSS_MODEL=OpenMOSS-Team/MOSS-TTS-Local-Transformer
      # ============================================================
      # Smart Device Selection
      # ============================================================
      # MOSS_VRAM_THRESHOLD: Minimum free VRAM (GB) to use GPU
      # Default: 4.0 (MOSS-TTS 1.7B needs ~6-8GB)
      - MOSS_VRAM_THRESHOLD=4.0
      # MOSS_FORCE_CPU: Force CPU mode regardless of VRAM
      - MOSS_FORCE_CPU=${MOSS_FORCE_CPU:-0}
      # MOSS_EAGER_LOAD: Load model at startup (not on first request)
      - MOSS_EAGER_LOAD=${MOSS_EAGER_LOAD:-1}
      # ============================================================
      # Inference Parameters
      # ============================================================
      # Audio temperature for first layer (higher = more variation)
      - MOSS_TEMPERATURE=1.5
      # Top-P nucleus sampling
      - MOSS_TOP_P=0.95
      # Top-K sampling
      - MOSS_TOP_K=50
      # Repetition penalty for audio layers
      - MOSS_REPETITION_PENALTY=1.1
      # ============================================================
      # torch.compile optimization (GPU only)
      # ============================================================
      # Compiles model graph for ~10-25% faster inference
      # First request after load is slower (~30-60s compilation)
      - MOSS_TORCH_COMPILE=1
      # ============================================================
      # Auto-Shutdown (like XTTS KEEP_ALIVE)
      # ============================================================
      # After X minutes of inactivity, container exits to free VRAM
      # Set to 0 to disable auto-shutdown
      - MOSS_KEEP_ALIVE=15
    volumes:
      # Cache HuggingFace models persistently
      - moss_models:/root/.cache/huggingface
      # Reference audio files for voice cloning (from project)
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5055/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s  # MOSS-TTS model download + load takes time (~3-5GB)

volumes:
  moss_models:
    name: moss_models
