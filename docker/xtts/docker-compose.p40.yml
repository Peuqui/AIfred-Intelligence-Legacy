services:
  xtts:
    image: xtts-p40
    build: .
    container_name: xtts-p40
    restart: "no"  # AIfred controls container lifecycle
    ports:
      - "5051:5051"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=0
      - CUDA_VISIBLE_DEVICES=0
      - COQUI_TOS_AGREED=1
      # ============================================================
      # Smart Device Selection
      # ============================================================
      - XTTS_VRAM_THRESHOLD=2.0
      - XTTS_FORCE_CPU=${XTTS_FORCE_CPU:-0}
      - XTTS_EAGER_LOAD=${XTTS_EAGER_LOAD:-1}
      # ============================================================
      # Inference Parameters (tune to reduce hallucinations)
      # ============================================================
      - XTTS_TEMPERATURE=0.65
      - XTTS_REPETITION_PENALTY=15.0
      - XTTS_LENGTH_PENALTY=1.0
      - XTTS_TOP_K=30
      - XTTS_TOP_P=0.75
      - XTTS_MAX_CHUNK_CHARS=250
      # ============================================================
      # Auto-Shutdown
      # ============================================================
      - XTTS_KEEP_ALIVE=15
    volumes:
      - xtts_models:/root/.local/share/tts
      - xtts_voices:/app/custom_voices
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  xtts_models:
    name: xtts_models
  xtts_voices:
    name: xtts_voices
