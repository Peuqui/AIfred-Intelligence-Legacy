services:
  xtts:
    build: .
    container_name: xtts
    restart: unless-stopped
    ports:
      - "5051:5051"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - COQUI_TOS_AGREED=1
      # ============================================================
      # Smart Device Selection
      # ============================================================
      # XTTS_VRAM_THRESHOLD: Minimum free VRAM (GB) to use GPU
      # Default: 2.0 (XTTS needs ~1.5-2GB)
      # If free VRAM < threshold: automatically falls back to CPU
      - XTTS_VRAM_THRESHOLD=2.0
      # XTTS_FORCE_CPU: Force CPU mode regardless of VRAM
      # Set to "1" or "true" to always use CPU (read from .env file)
      - XTTS_FORCE_CPU=${XTTS_FORCE_CPU:-0}
      # ============================================================
      # Inference Parameters (tune to reduce hallucinations)
      # ============================================================
      # See: https://github.com/coqui-ai/TTS/discussions/4146
      # Lower temperature = more stable, less creative (default: 0.75)
      - XTTS_TEMPERATURE=0.65
      # Higher repetition_penalty = prevents repeating (default: 10.0)
      - XTTS_REPETITION_PENALTY=15.0
      # Length penalty for longer sentences (default: 1.0)
      - XTTS_LENGTH_PENALTY=1.0
      # Lower top_k = more deterministic (default: 50)
      - XTTS_TOP_K=30
      # Lower top_p = more deterministic (default: 0.85)
      - XTTS_TOP_P=0.75
      # Max characters per chunk (default: 250)
      - XTTS_MAX_CHUNK_CHARS=250
    volumes:
      # Cache models persistently
      - xtts_models:/root/.local/share/tts
      # Custom voice embeddings (persistent)
      - xtts_voices:/app/custom_voices
      # Reference audio files for voice cloning (from project)
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s  # XTTS model needs time to download/load (~1.5GB)

volumes:
  xtts_models:
    name: xtts_models
  xtts_voices:
    name: xtts_voices
