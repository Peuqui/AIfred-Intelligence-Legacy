services:
  xtts:
    build: .
    container_name: xtts
    restart: unless-stopped
    ports:
      - "5051:5051"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=0
      - COQUI_TOS_AGREED=1
    volumes:
      # Cache models persistently
      - xtts_models:/root/.local/share/tts
      # Custom voice embeddings (persistent)
      - xtts_voices:/app/custom_voices
      # Reference audio files for voice cloning (from project)
      - ./voices:/app/voices:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5051/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s  # XTTS model needs time to download/load (~1.5GB)

volumes:
  xtts_models:
    name: xtts_models
  xtts_voices:
    name: xtts_voices
